<!DOCTYPE html>
<html>

<head>
    <title>SignUp and Login</title>
    <link rel="stylesheet" type="text/css" href="css/log_in.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="registrationForm" action="">
                <h1>Crear cuenta</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa fa-facebook"></i></a>
                    <a href="#" class="social"><i class="fa fa-google"></i></a>
                    <a href="#" class="social"><i class="fa fa-linkedin"></i></a>
                </div>
                <span>O usa tu email para registrarte</span>
                <input type="text" name="name" placeholder="Nombre">
                <input type="email" name="email" placeholder="Correo">
                <input type="password" name="password" placeholder="Contraseña">
                <button id="signUp">Registrarse</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form id="loginForm" action="#">
                <h1>Iniciar sesion</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fa fa-facebook"></i></a>
                    <a href="#" class="social"><i class="fa fa-google"></i></a>
                    <a href="#" class="social"><i class="fa fa-linkedin"></i></a>
                </div>
                <span>o usa tu cuenta</span>
                <input type="email" name="email" placeholder="Correo">
                <input type="password" name="password" placeholder="Contraseña">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <button id="signInButton">Iniciar sesion</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>BIENVENIDO!</h1>
                    <p>Para mantenerse conectado con nosotros, inicie sesión con su información personal</p>
                    <button class="ghost" id="signIn">Iniciar sesion</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>HOLA!</h1>
                    <p>Ingresa tus datos y comienza tu viaje con nosotros</p>
                    <button class="ghost" id="signUpSwitch">Registrarse</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Manejar el registro
        document.querySelector('#registrationForm').addEventListener('submit', async function (event) {
            try {
                event.preventDefault();
                const name = document.querySelector('input[name="name"]').value;
                const email = document.querySelector('input[name="email"]').value;
                const password = document.querySelector('input[name="password"]').value;

                const response = await fetch('http://localhost:4000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password }),
                });

                if (response.ok) {
                    console.log('Registro exitoso');
                } else {
                    console.error('Error en el registro:', response.statusText);
                }
            } catch (err) {
                console.error('Error al manejar el registro:', err);
            }
        });

        // Manejar el inicio de sesión
        document.querySelector('#loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.querySelector('input[name="email"]').value;
            const password = document.querySelector('input[name="password"]').value;

            const response = await fetch('http://localhost:4000/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password }),
            });

            if (response.ok) {
                console.log('Inicio de sesión exitoso');
            } else {
                console.error('Error en el inicio de sesión:', response.statusText);
            }
        });

        // Cambiar entre formularios de inicio de sesión y registro
        document.querySelector('#signUpSwitch').addEventListener('click', function () {
            document.querySelector('.sign-in-container').classList.toggle('active');
            document.querySelector('.sign-up-container').classList.toggle('active');
        });
    </script>
</body>

</html>
